<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Quiz Toán 12 — 50 câu (Mức B)</title>
<style>
:root{
  --bg1:#081426; --bg2:#0f2940; --accent:#00d4ff; --good:#00c853; --bad:#ff5252;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0;font-family:Inter, "Segoe UI", Roboto, Arial;background:linear-gradient(180deg,var(--bg1),var(--bg2));color:#e8f0ff}
body{display:flex;align-items:center;justify-content:center;padding:20px}

.container{width:980px;max-width:98vw;background:rgba(255,255,255,0.04);border-radius:14px;padding:22px;backdrop-filter:blur(6px);box-shadow:0 14px 40px rgba(2,6,23,0.6);position:relative;max-height:92vh;overflow:hidden}
.header{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
.title{font-weight:800;font-size:20px}
.subtitle{color:rgba(230,238,248,0.75);font-size:13px}
.timer{font-weight:700;color:var(--accent)}
.controls{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.progress-track{flex:1;height:10px;background:rgba(255,255,255,0.03);border-radius:999px;overflow:hidden}
.progress-bar{height:100%;width:0;background:linear-gradient(90deg,#7affd5,#00d4ff);transition:width .25s ease}
.qbox{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));padding:18px;border-radius:10px;border:1px solid rgba(255,255,255,0.02);min-height:220px;overflow:auto}
.qmeta{font-size:13px;color:rgba(230,238,248,0.8);margin-bottom:8px}
.qtext{font-size:18px;margin-bottom:14px}
.options{display:flex;flex-direction:column;gap:10px}
.opt{display:flex;gap:12px;align-items:center;padding:12px;border-radius:10px;background:rgba(0,0,0,0.12);cursor:pointer;border:1px solid rgba(255,255,255,0.02);transition:0.18s}
.opt:hover{transform:translateY(-4px);box-shadow:0 8px 20px rgba(2,6,23,0.35)}
.opt.disabled{pointer-events:none;opacity:0.95}
.letter{width:40px;height:40px;border-radius:8px;background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-weight:800}
.feedback{margin-top:12px;font-weight:700}
.nav{display:flex;gap:10px;align-items:center;margin-top:14px}
.btn{padding:10px 14px;border-radius:10px;border:none;cursor:pointer;font-weight:800;background:linear-gradient(90deg,var(--accent),#006bff);color:#012}
.btn.secondary{background:transparent;border:1px solid rgba(255,255,255,0.04);color:rgba(230,238,248,0.95)}
.result{margin-top:18px;padding:14px;border-radius:10px;background:linear-gradient(180deg, rgba(0,0,0,0.25), rgba(255,255,255,0.02));display:none;max-height:40vh;overflow:auto}
.result h2{margin:0 0 6px 0}
.review-item{margin-bottom:10px;padding:8px;border-radius:8px;background:rgba(255,255,255,0.02)}
.small{font-size:13px;color:rgba(230,238,248,0.8)}
.slide-out{opacity:0;transform:translateX(-18px);transition:all .36s ease}
.slide-in{opacity:1;transform:translateX(0);transition:all .36s ease}
.scrollbar::-webkit-scrollbar{height:8px;width:8px}
.scrollbar::-webkit-scrollbar-thumb{background:#00c6ff;border-radius:8px}
@media (max-width:760px){ .container{padding:14px} .qtext{font-size:16px} .letter{width:34px;height:34px} }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <div class="title">📘 HỆ THỐNG TRẮC NGHIỆM TOÁN 12 — 50 câu (Mức: B)</div>
      <div class="subtitle">Không random — thứ tự: dễ → trung bình → nâng cao | Lưu cục bộ</div>
    </div>
    <div style="text-align:right">
      <div id="team" class="small">Nhóm: Rubik'sCube</div>
      <div id="timerTop" class="timer">⏳ 30:00</div>
    </div>
  </div>

  <div class="controls">
    <div class="small">Tiến độ</div>
    <div class="progress-track"><div id="progressBar" class="progress-bar"></div></div>
    <div id="progressText" class="small">0/50</div>
  </div>

  <div id="qbox" class="qbox slide-in scrollbar" aria-live="polite">
    <!-- question injected here -->
  </div>

  <div class="nav">
    <button id="prevBtn" class="btn secondary">‹ Trước</button>
    <button id="nextBtn" class="btn secondary">Tiếp ›</button>
    <button id="submitBtn" class="btn" style="margin-left:auto">Nộp bài</button>
    <button id="exportBtn" class="btn secondary">Xuất CSV</button>
  </div>

  <div id="result" class="result" aria-live="polite"></div>
</div>

<script>
// ========== CONFIG & STATE ==========
let timeLeft = 30 * 60; // seconds (30 min)
const TOTAL = 50;
let cur = 0;
let answers = {}; // 'q0': idx
let questions = []; // will fill below
let scoreFinal = null;
const STORAGE_KEY = 'math12_quiz_v3';

// ========== QUESTIONS (50 distinct, ordered) ==========
questions = [
/* 1-10: cơ bản/trắc nghiệm nhanh */
{q:"1) Đạo hàm của f(x)=x^3 là:", opts:["3x^2","x^2","3x","x^3"], ans:0, explain:"(x^n)' = n·x^(n-1) => (x^3)' = 3x^2."},
{q:"2) ∫ 2x dx bằng:", opts:["x^2 + C","2x^2 + C","x^2/2 + C","2 + C"], ans:0, explain:"∫2x dx = 2·x^2/2 = x^2 + C."},
{q:"3) lim x→0 sin x / x =", opts:["1","0","∞","-1"], ans:0, explain:"Giới hạn chuẩn: 1."},
{q:"4) log_2 16 = ?", opts:["4","2","8","16"], ans:0, explain:"2^4 = 16."},
{q:"5) Giá trị sin(π/6) =", opts:["1/2","√3/2","1","0"], ans:0, explain:"sin 30° = 1/2."},
{q:"6) Đạo hàm ln x =", opts:["1/x","ln x","x","e^x"], ans:0, explain:"(ln x)' = 1/x."},
{q:"7) ∫ e^x dx =", opts:["e^x + C","x e^x","1/e^x","ln x"], ans:0, explain:"Nguyên hàm của e^x là chính nó."},
{q:"8) cos π =", opts:["-1","1","0","π"], ans:0, explain:"cos π = -1."},
{q:"9) Độ dài vector (1,2,2) là:", opts:["3","√3","2","√6"], ans:0, explain:"√(1^2+2^2+2^2)=√9=3."},
{q:"10) C(5,2) bằng:", opts:["10","5","20","15"], ans:0, explain:"C(5,2)=5·4/2=10."},

/* 11-20: đạo hàm & tích phân ứng dụng */
{q:"11) Đạo hàm của y=sin x là:", opts:["cos x","-cos x","sin x","-sin x"], ans:0, explain:"(sin x)' = cos x."},
{q:"12) ∫ cos x dx =", opts:["sin x + C","-sin x + C","cos x + C","-cos x + C"], ans:0, explain:"Nguyên hàm của cos x là sin x."},
{q:"13) Tìm đạo hàm của y=e^{2x}:", opts:["2e^{2x}","e^{2x}","e^x","2e^x"], ans:0, explain:"(e^{ax})' = a e^{ax}."},
{q:"14) ∫ x dx =", opts:["x^2/2 + C","x + C","2x + C","x^2 + C"], ans:0, explain:"Công thức ∫ x^n dx."},
{q:"15) Giới hạn lim x→∞ (1/x) = ?", opts:["0","1","∞","-1"], ans:0, explain:"1/x → 0 khi x → ∞."},
{q:"16) Đạo hàm của y=ln(2x) là:", opts:["1/x","1/(2x)","2/x","ln2"], ans:0, explain:"ln(2x)' = 1/x (do ln(2x)=ln2+ln x)."},
{q:"17) ∫ 1/x dx =", opts:["ln|x| + C","1/x + C","x + C","e^x + C"], ans:0, explain:"Công thức chuẩn."},
{q:"18) ∫ 0 dx =", opts:["C","0","1","x"], ans:0, explain:"Nguyên hàm của 0 là hằng số C."},
{q:"19) Đạo hàm (x^2+3x)' =", opts:["2x+3","2x","3x","x+3"], ans:0, explain:"Dạng đa thức, đạo hàm từng phần."},
{q:"20) ∫ (3) dx =", opts:["3x + C","x^3 + C","3 + C","C"], ans:0, explain:"Nguyên hàm của hằng số."},

/* 21-30: log, mũ, phương trình, số phức */
{q:"21) Giải log_10 x = 2 → x = ?", opts:["100","10","2","0.01"], ans:0, explain:"10^2 = 100."},
{q:"22) Nghiệm thực của x^2 - 4 = 0 là:", opts:["±2","2","-2","0"], ans:0, explain:"x^2=4 → x=±2."},
{q:"23) i^3 bằng:", opts:["-i","i","-1","1"], ans:0, explain:"i^2=-1 ⇒ i^3 = i^2·i = -i."},
{q:"24) Quy tắc nhân log: log(ab) = ?", opts:["log a + log b","log a - log b","log a · log b","a log b"], ans:0, explain:"Tính chất logarit."},
{q:"25) 2^5 = ?", opts:["32","25","10","16"], ans:0, explain:"2^5 = 32."},
{q:"26) Phương trình e^x = 1 có nghiệm:", opts:["x=0","x=1","x=-1","vô nghiệm"], ans:0, explain:"e^0 = 1."},
{q:"27) Giá trị |3-4i| là:", opts:["5","1","√7","7"], ans:0, explain:"√(3^2+(-4)^2)=5."},
{q:"28) log_a a^x = ?", opts:["x","a^x","log x","1"], ans:0, explain:"Tính chất logarit: log_a(a^x)=x."},
{q:"29) Giải: ln e = ?", opts:["1","0","e","-1"], ans:0, explain:"ln e = 1."},
{q:"30) 10^(−2) = ?", opts:["0.01","0.1","0.001","-0.01"], ans:0, explain:"10^-2 = 0.01."},

/* 31-40: tổ hợp/xác suất, cấp số, chuỗi, giới hạn phức hợp */
{q:"31) Số cách chọn 2 từ 5 là C(5,2) = ?", opts:["10","5","20","15"], ans:0, explain:"C(5,2)=10."},
{q:"32) Xác suất tung 2 đồng xu cùng mặt ngửa là?", opts:["1/4","1/2","1","0"], ans:0, explain:"(1/2)*(1/2)=1/4."},
{q:"33) Cấp số cộng: u_n = 2 + (n-1)·3. u_3 là?", opts:["8","5","11","2"], ans:0, explain:"u3 = 2 + 2·3 = 8."},
{q:"34) Tổng nhị thức (a+b)^2 = ?", opts:["a^2 + 2ab + b^2","a^2 - b^2","a^2 + b^2","2ab"], ans:0, explain:"Phát triển bình phương hai số."},
{q:"35) lim x→0 (1 + x)^{1/x} =", opts:["e","1","0","∞"], ans:0, explain:"Giá trị giới hạn nổi tiếng ≈ e."},
{q:"36) Nếu P(A)=0.3, P(B)=0.4 và A,B độc lập, P(A∩B) = ?", opts:["0.12","0.7","0.1","0.3"], ans:0, explain:"Độc lập ⇒ P(A∩B)=P(A)P(B)=0.12."},
{q:"37) Tích phân ∫ 2x dx =", opts:["x^2 + C","2x + C","x + C","2 + C"], ans:0, explain:"Nhân số 2 bên ngoài, ∫x dx."},
{q:"38) Tổng n số tự nhiên 1..n = ?", opts:["n(n+1)/2","n^2","(n-1)n/2","n!"], ans:0, explain:"Công thức Gauss."},
{q:"39) Hàm y = x^3 có đạo hàm tại x bằng:", opts:["3x^2","x^3","x^2","3x"], ans:0, explain:"(x^3)' = 3x^2."},
{q:"40) Giới hạn lim x→∞ ( (2x+1)/(x) ) =", opts:["2","1","∞","0"], ans:0, explain:"Chia tử mẫu cho x, giới hạn là 2."},

/* 41-50: khảo sát hàm, GTLN, GTNN, hình học không gian, ứng dụng */
{q:"41) Cho f(x)=x^2-4x+3, đạo hàm f'(x) = ?", opts:["2x-4","2x+4","x-4","2x"], ans:0, explain:"f'(x)=2x-4."},
{q:"42) Để f'(x)=0 ⇒ 2x-4=0 ⇒ nghiệm x=", opts:["2","-2","4","0"], ans:0, explain:"2x=4 ⇒ x=2."},
{q:"43) GTLN của hàm bậc hai ax^2+bx+c (a>0) là tại ?", opts:["điểm cực tiểu","điểm cực đại","biên","vô hạn"], ans:0, explain:"a>0 ⇒ parabol hướng lên ⇒ cực tiểu."},
{q:"44) Diện tích tam giác cạnh a,b và góc giữa là θ: S = ?", opts:["(1/2)ab sin θ","ab sin θ","(1/2)ab cos θ","ab"], ans:0, explain:"Công thức diện tích cơ bản."},
{q:"45) Vector (1,2,3) vuông góc với vector nào dưới đây?", opts:["(2,-1,0)","(1,2,3)","(0,0,0)","(1,1,1)"], ans:0, explain:"Kiểm tra tích vô hướng = 0."},
{q:"46) Khoảng cách từ điểm (1,0,0) đến mặt phẳng x=0 là ?", opts:["1","0","-1","√1"], ans:0, explain:"Khoảng cách theo toạ độ x."},
{q:"47) Phân phối nhị thức với n=1 tương đương?", opts:["Bernoulli","Poisson","Normal","Uniform"], ans:0, explain:"n=1 ⇒ Bernoulli."},
{q:"48) Tập xác định của log x là:", opts:["x>0","x≥0","x<0","mọi x"], ans:0, explain:"Điều kiện xác định log."},
{q:"49) Tích phân bất định ∫ cos(2x) dx =", opts:["(1/2) sin(2x) + C","sin(2x)+C","-sin(2x)+C","(1/2) cos(2x)"], ans:0, explain:"Dùng thay u=2x."},
{q:"50) Độ lệch chuẩn mô tả:", opts:["phân tán dữ liệu","trung bình","độ dài","tần suất"], ans:0, explain:"Độ lệch chuẩn đo phân tán."}
];

// ========== UI refs ==========
const qbox = document.getElementById('qbox');
const progressBar = document.getElementById('progressBar');
const progressText = document.getElementById('progressText');
const timerTop = document.getElementById('timerTop');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const submitBtn = document.getElementById('submitBtn');
const exportBtn = document.getElementById('exportBtn');
const resultDiv = document.getElementById('result');

// ========== load/save state ==========
function saveState(final=false){
  const payload = {answers, cur, timeLeft: final? undefined: timeLeft, savedAt: Date.now()};
  localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
}
function loadState(){
  try{
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
    if(s && s.answers){ answers = s.answers || {}; cur = s.cur || 0; if(s.timeLeft) timeLeft = s.timeLeft; }
  }catch(e){ answers={}; cur=0; }
}
loadState();

// ========== render question ==========
let locked = false;
function renderQuestion(i){
  if(i<0) i=0;
  if(i>=questions.length) i=questions.length-1;
  cur = i;
  qbox.classList.remove('slide-in'); qbox.classList.add('slide-out');
  setTimeout(()=>{
    qbox.classList.remove('slide-out');
    // meta
    const meta = `<div class="qmeta">Câu ${cur+1} / ${TOTAL}</div>`;
    const qtext = `<div class="qtext">${questions[cur].q}</div>`;
    // options
    let optsHtml = '<div class="options">';
    for(let k=0;k<questions[cur].opts.length;k++){
      const letter = String.fromCharCode(65+k);
      const chosen = answers['q'+cur];
      const disabled = (chosen !== undefined) ? 'opt disabled' : 'opt';
      optsHtml += `<div class="${disabled}" data-index="${k}" tabindex="0"><div class="letter">${letter}</div><div class="text">${questions[cur].opts[k]}</div></div>`;
    }
    optsHtml += '</div>';
    qbox.innerHTML = meta + qtext + optsHtml + '<div id="feedback" class="feedback"></div>';
    // attach events
    document.querySelectorAll('.opt').forEach(el=>{
      el.onclick = ()=> choose(parseInt(el.dataset.index));
      el.onkeydown = (e)=>{ if(e.key==='Enter' || e.key===' ') choose(parseInt(el.dataset.index)); };
    });
    // update progress
    progressBar.style.width = Math.round((Object.keys(answers).length/TOTAL)*100) + '%';
    progressText.textContent = `${Object.keys(answers).length}/${TOTAL}`;
    // disable prev/next appropriately
    prevBtn.disabled = cur===0;
    nextBtn.disabled = cur===TOTAL-1;
    saveState();
    setTimeout(()=> qbox.classList.add('slide-in'), 20);
  }, 160);
}

// ========== choose answer ==========
function choose(idx){
  if(locked) return;
  locked = true;
  const correct = questions[cur].ans;
  // mark answers
  answers['q'+cur] = idx;
  // disable all options
  document.querySelectorAll('.opt').forEach(o=>o.classList.add('disabled'));
  // highlight chosen and correct
  const opts = document.querySelectorAll('.opt');
  if(idx === correct){
    opts[idx].classList.add('opt','correct');
    document.getElementById('feedback').textContent = '✅ Chính xác!';
  } else {
    opts[idx].classList.add('opt','wrong');
    if(opts[correct]) opts[correct].classList.add('opt','correct');
    document.getElementById('feedback').textContent = `❌ Sai — Đáp đúng: ${questions[cur].opts[correct]}`;
  }
  // update progress immediately and save
  progressBar.style.width = Math.round((Object.keys(answers).length/TOTAL)*100) + '%';
  progressText.textContent = `${Object.keys(answers).length}/${TOTAL}`;
  saveState();
  setTimeout(()=>{
    locked = false;
    if(cur < TOTAL-1) { renderQuestion(cur+1); } else { finalize(); }
  }, 800);
}

// ========== nav handlers ==========
prevBtn.onclick = ()=> { if(!locked && cur>0){ renderQuestion(cur-1); } };
nextBtn.onclick = ()=> { if(!locked && cur<TOTAL-1){ renderQuestion(cur+1); } };
submitBtn.onclick = ()=> { if(confirm('Xác nhận nộp bài?')) finalize(); };
exportBtn.onclick = ()=> exportCSV();

// keyboard navigation
document.addEventListener('keydown', (e)=>{
  if(e.key==='ArrowLeft') prevBtn.click();
  if(e.key==='ArrowRight') nextBtn.click();
  if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='s'){ e.preventDefault(); finalize(); }
});

// ========== TIMER ==========
function formatTime(s){ const m=Math.floor(s/60), sec=s%60; return `${m<10?'0':''}${m}:${sec<10?'0':''}${sec}`; }
const timerId = setInterval(()=>{
  timerTop.textContent = '⏳ ' + formatTime(timeLeft);
  if(timeLeft<=0){ clearInterval(timerId); finalize(); return; }
  timeLeft--; if(timeLeft%5===0) saveState();
},1000);

// ========== finalize & scoring ==========
function finalize(){
  // compute score
  let correctCount=0;
  const wrongList = [];
  for(let i=0;i<TOTAL;i++){
    const key = 'q'+i;
    const chosen = answers[key];
    if(chosen !== undefined && chosen === questions[i].ans) correctCount++;
    else {
      wrongList.push({
        num: i+1,
        q: questions[i].q,
        your: chosen !== undefined ? questions[i].opts[chosen] : 'Chưa trả lời',
        correct: questions[i].opts[questions[i].ans],
        explain: questions[i].explain
      });
    }
  }
  const pct = Math.round((correctCount/TOTAL)*100);
  let level='', comment='';
  if(pct>=90){ level='Xuất sắc (9-10)'; comment='Bạn nắm chắc kiến thức Toán 12, tiếp tục luyện đề nâng cao.'; }
  else if(pct>=75){ level='Rất tốt (7-8)'; comment='Kiến thức tốt, nên luyện thêm câu ứng dụng.'; }
  else if(pct>=50){ level='Khá (5-6)'; comment='Nền tảng ổn, cần cố gắng thêm ở phần tích phân/đạo hàm.'; }
  else { level='Cần cố gắng'; comment='Nên ôn lại lý thuyết cơ bản và làm nhiều bài tập.'; }

  // lock UI
  locked = true;
  // render result box
  resultDiv.style.display = 'block';
  resultDiv.innerHTML = `
    <h2>KẾT QUẢ</h2>
    <h3>Điểm: ${correctCount}/${TOTAL} (${pct}%)</h3>
    <h3>Xếp loại: ${level}</h3>
    <p>${comment}</p>
    <hr>
    <h4>Các câu sai / chưa trả lời (kèm lý thuyết tham khảo)</h4>
    <div id="wrongs"></div>
    <div style="margin-top:12px"><button id="retakeBtn" class="btn secondary">Làm lại</button> <button id="downloadBtn" class="btn">Tải CSV kết quả</button></div>
  `;
  const wdiv = document.getElementById('wrongs');
  if(wrongList.length===0){ wdiv.innerHTML = `<div class="small" style="color:var(--good)">Không có câu sai — xuất sắc!</div>`; }
  else {
    wdiv.innerHTML = wrongList.map(w => `<div class="review-item"><b>Câu ${w.num}:</b> ${w.q}<br>Đáp đúng: <em>${w.correct}</em><br>Bạn: <em>${w.your}</em><br>Giải thích: ${w.explain}</div>`).join('');
  }
  document.getElementById('retakeBtn').onclick = ()=> { if(confirm('Làm lại sẽ xóa dữ liệu cục bộ. Tiếp tục?')) { localStorage.removeItem(STORAGE_KEY); location.reload(); } };
  document.getElementById('downloadBtn').onclick = ()=> exportCSV(correctCount,pct,wrongList);

  // scroll result into view
  resultDiv.scrollIntoView({behavior:'smooth'});
  // stop timer and save final
  clearInterval(timerId);
  saveState(true);
}

// ========== CSV export ==========
function exportCSV(scoreArg, pctArg, wrongListArg){
  // if called from exportBtn (partial), build partial; if from finalize, use full details
  const header = ['Team','Rubik\'sCube'];
  const meta = [['Score', scoreArg!==undefined? `${scoreArg}/${TOTAL}` : 'N/A'], ['Percent', pctArg!==undefined? pctArg+'%':'N/A']];
  const rows = [['Question','Your answer','Correct answer','Explain']];
  for(let i=0;i<TOTAL;i++){
    const key = 'q'+i;
    const y = answers[key];
    rows.push([questions[i].q, y===undefined? '': questions[i].opts[y], questions[i].opts[questions[i].ans], questions[i].explain]);
  }
  const csv = [header.map(c=>`"${c}"`).join(','), '', ...meta.map(r=>r.map(c=>`"${c}"`).join(',')), '', ...rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(','))].join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'rubikscube_results.csv'; a.click(); URL.revokeObjectURL(url);
}

// ========== INIT ==========
renderQuestion(cur);
saveState();
</script>
</body>
